version: v3
teleport:
  nodename: 4d46cc37175f
  data_dir: /var/lib/teleport
  log:
    output: stderr
    severity: INFO
    format:
      output: text
  ca_pin: ""
  diag_addr: ""
auth_service:
  enabled: yes
  listen_addr: 0.0.0.0:3025
  cluster_name: debian-server
  proxy_listener_mode: multiplex
  authentication:
    type: local
    second_factor: off # habilitar o 2 FA

  # somente para testes nos clientes
  tokens:
    - proxy,node:labtoken123

ssh_service:
  enabled: no

proxy_service:
  enabled: yes
  web_listen_addr: 0.0.0.0:443
  public_addr: debian-server:443
  https_keypairs:
    - key_file: /var/lib/teleport/teleport.key
      cert_file: /var/lib/teleport/teleport.pem
  https_keypairs_reload_interval: 0s
  acme: {}
